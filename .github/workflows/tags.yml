name: Update Floating Tags

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  update-tags:
    name: Update Floating Tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Update Tags
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Processing tag: $TAG"

          # Only update floating tags for stable releases (vX.Y.Z, no pre-release suffix)
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Skipping pre-release tag: $TAG"
            exit 0
          fi

          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f1,2)

          echo "Major: $MAJOR, Minor: $MINOR"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -fa "$MAJOR" -m "Update $MAJOR to $TAG"
          git push origin "$MAJOR" --force

          git tag -fa "$MINOR" -m "Update $MINOR to $TAG"
          git push origin "$MINOR" --force
