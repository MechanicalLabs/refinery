name: Pre-compile Packagers

on:
  push:
    tags: ["packagers-v*"]
  workflow_dispatch:

jobs:
  build-linux-packagers:
    name: ${{ matrix.tool }} (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: cargo-deb
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - tool: cargo-rpm
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - tool: cargo-deb
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - tool: cargo-rpm
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build ${{ matrix.tool }}
        run: cargo install ${{ matrix.tool }} --target ${{ matrix.target }}
      - name: Copy binary
        run: cp "$HOME/.cargo/bin/${{ matrix.tool }}" "${{ matrix.tool }}-${{ matrix.target }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.tool }}-${{ matrix.target }}
          path: ${{ matrix.tool }}-${{ matrix.target }}

  build-windows-packagers:
    name: ${{ matrix.tool }} (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: cargo-wix
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - tool: cargo-wix
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Build ${{ matrix.tool }}
        run: cargo install ${{ matrix.tool }} --target ${{ matrix.target }}
        shell: bash
      - name: Copy binary
        shell: bash
        run: cp "$HOME/.cargo/bin/${{ matrix.tool }}.exe" "${{ matrix.tool }}-${{ matrix.target }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.tool }}-${{ matrix.target }}
          path: ${{ matrix.tool }}-${{ matrix.target }}

  create-release:
    name: Create Release
    needs: [build-linux-packagers, build-windows-packagers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: ./packages
      - name: Display structure
        run: find ./packages -type f | sort
        shell: bash
      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./packages/*
          fail_on_unmatched_files: true
          generate_release_notes: false
      - name: Update packagers-latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete packagers-latest --yes 2>/dev/null || true
          gh release create packagers-latest --title "Packagers (latest)" --notes "" ./packages/*
